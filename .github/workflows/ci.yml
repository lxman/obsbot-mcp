name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  helper-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Cache the CMake build dir, keyed on the native sources + runner image so
      # any source change or image update busts it (incremental build on an exact
      # hit). Marginal for this small build, but cheap and safe.
      - name: Cache native build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: native/windows/build
          key: ${{ runner.os }}-${{ env.ImageOS }}-cmake-${{ hashFiles('native/windows/helper.cpp', 'native/windows/CMakeLists.txt') }}
      # The CMake generator is deliberately left to the windows-latest default
      # (currently VS 2026) rather than pinned with -G, so image updates don't
      # break the build; --config Release selects the config at build time.
      - name: Configure (CMake)
        run: cmake -S native/windows -B native/windows/build -DCMAKE_BUILD_TYPE=Release
      - name: Build (CMake)
        run: cmake --build native/windows/build --config Release
      - name: Verify helper binary exists
        run: |
          test -f native/windows/build/Release/obsbot-helper.exe \
            && echo "OK: obsbot-helper.exe built" \
            || { echo "::error::helper binary not produced"; exit 1; }

  helper-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache native build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: native/macos/build
          key: ${{ runner.os }}-cmake-${{ hashFiles('native/macos/helper.m', 'native/macos/CMakeLists.txt') }}
      - name: Configure (CMake)
        run: cmake -S native/macos -B native/macos/build -DCMAKE_BUILD_TYPE=Release
      - name: Build (CMake)
        run: cmake --build native/macos/build
      - name: Verify helper binary exists
        run: |
          test -f native/macos/build/obsbot-helper \
            && echo "OK: obsbot-helper built" \
            || { echo "::error::helper binary not produced"; exit 1; }

  helper-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libjpeg-dev
      - name: Cache native build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: native/linux/build
          key: ${{ runner.os }}-cmake-${{ hashFiles('native/linux/helper.c', 'native/linux/CMakeLists.txt') }}
      - name: Configure (CMake)
        run: cmake -S native/linux -B native/linux/build -DCMAKE_BUILD_TYPE=Release
      - name: Build (CMake)
        run: cmake --build native/linux/build
      - name: Verify helper binary exists
        run: |
          test -f native/linux/build/obsbot-helper \
            && echo "OK: obsbot-helper built" \
            || { echo "::error::helper binary not produced"; exit 1; }
