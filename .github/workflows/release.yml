name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build + pack + publish --dry-run only (no real publish/release)'
        type: boolean
        default: true

permissions:
  contents: read

# Serialize releases so two tags never publish at once; never cancel an
# in-flight publish.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-helper:
    strategy:
      matrix:
        include:
          - os: windows-latest
            triple: win32-x64
            helper: obsbot-helper.exe
            src: native/windows
            build: native/windows/build
            build_out: native/windows/build/Release
          # Enable once a macOS helper source exists:
          # - os: macos-latest
          #   triple: darwin-arm64
          #   helper: obsbot-helper
          - os: ubuntu-latest
            triple: linux-x64
            helper: obsbot-helper
            src: native/linux
            build: native/linux/build
            build_out: native/linux/build
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libjpeg-dev
      # Cache the CMake build dir, keyed on the native sources + runner image +
      # triple so any change busts it (incremental build on an exact hit).
      - name: Cache native build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ matrix.build }}
          key: ${{ runner.os }}-${{ env.ImageOS }}-cmake-${{ matrix.triple }}-${{ hashFiles(matrix.src + '/CMakeLists.txt', matrix.src + '/helper.*') }}
      # The CMake generator is deliberately left to the runner default (currently
      # VS 2026) rather than pinned with -G, so image updates don't break the build.
      - name: Configure (CMake)
        run: cmake -S ${{ matrix.src }} -B ${{ matrix.build }} -DCMAKE_BUILD_TYPE=Release
      - name: Build (CMake)
        run: cmake --build ${{ matrix.build }} --config Release
      - name: Stage binary into native/prebuilt/<triple>
        run: |
          mkdir -p "native/prebuilt/${{ matrix.triple }}"
          cp "${{ matrix.build_out }}/${{ matrix.helper }}" \
             "native/prebuilt/${{ matrix.triple }}/${{ matrix.helper }}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.triple }}
          path: native/prebuilt/${{ matrix.triple }}/${{ matrix.helper }}
          if-no-files-found: error

  publish:
    needs: build-helper
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC trusted publishing (no npm token)
      contents: write   # create the GitHub Release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - name: Upgrade npm to >= 11.5.1 (required for trusted publishing)
        run: |
          npm install -g npm@latest
          npm --version
      - name: Verify tag matches package.json (real releases only)
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag $TAG does not match package.json version $PKG"
            exit 1
          fi
      - run: npm ci
      # Build dist/ for the tarball. Tests are NOT re-run here: the release flow
      # tags a commit already proven green by ci.yml on master (see RELEASING.md).
      - run: npm run build
      - name: Download Windows helper (win32-x64)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: win32-x64
          path: native/prebuilt/win32-x64
      - name: Download Linux helper (linux-x64)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: linux-x64
          path: native/prebuilt/linux-x64
      - name: Verify staged binary layout
        run: |
          echo "--- native/prebuilt tree ---"; ls -R native/prebuilt
          test -f native/prebuilt/win32-x64/obsbot-helper.exe \
            || { echo "::error::helper not staged at native/prebuilt/win32-x64/obsbot-helper.exe"; exit 1; }
          test -f native/prebuilt/linux-x64/obsbot-helper \
            || { echo "::error::helper not staged at native/prebuilt/linux-x64/obsbot-helper"; exit 1; }
      - name: Verify tarball contents
        run: |
          npm pack --dry-run 2>&1 | tee pack.txt
          grep -q "native/prebuilt/win32-x64/obsbot-helper.exe" pack.txt \
            || { echo "::error::win32-x64 helper missing from tarball"; exit 1; }
          grep -q "native/prebuilt/linux-x64/obsbot-helper" pack.txt \
            || { echo "::error::linux-x64 helper missing from tarball"; exit 1; }
          grep -q "dist/index.js" pack.txt \
            || { echo "::error::dist/index.js missing from tarball"; exit 1; }
          rm -f pack.txt
      # On a tag push (real release) inputs.dry_run is empty -> real publish, and
      # the tag/version guard above has already run. A manual workflow_dispatch
      # with dry_run:false is an intentional escape hatch that publishes WITHOUT
      # that guard (and creates no Release) — use it knowingly.
      - name: Publish to npm (OIDC) or dry-run
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "DRY RUN — not publishing"
            npm publish --dry-run
          else
            npm publish
          fi
      - name: Create GitHub Release (real tags only)
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            native/prebuilt/win32-x64/obsbot-helper.exe \
            native/prebuilt/linux-x64/obsbot-helper \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
